version: '3.1'

services:
  php:
#    image: php:7.4-apache
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 80:80
    volumes:
      - ./beta:/var/www/html/
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
  db:
    image: mariadb:10.3
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
#      - PMA_ARBITRARY=1
#        PMA_HOST: mysql
#        PMA_PORT: 3306
        UPLOAD_LIMIT: 300M